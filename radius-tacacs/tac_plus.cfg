id = spawnd {
    listen = { port = 49 }
    spawn = {
        instances min = 1
        instances max = 10
    }
    background = no
}

id = tac_plus {
    accounting log = /var/log/tac_plus_acct.log

    host = world {
        address = ::/0
        key = digitac
    }

    user = admintac {
        password = clear password1
        service = system {
            default attribute = permit
            set groupname = admin
        }
    }

    user = newuseradmin {
	password = clear newpassadmin
	service = system {
		default attribute = permit
		set groupname = admin
	}
    }

    user = newtest {
	password = clear newtestpass
	service = system {
		default attribute = permit
		set groupname = users
	}	
    }


    user = usertac {
        password = clear password
        service = system {
            default attribute = permit
            set groupname = users
        }
    }
}
